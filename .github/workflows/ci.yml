name: CI Teste Básico

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Teste simples
        run: echo "Pipeline funcionando!"

      - name: Rodar lint
        run: npx eslint src

      - name: Rodar testes
        run: npm test

      - name: Instalar dependências
        run: npm ci